{% extends 'base.html' %}

{% block title %}Order Confirmed{% endblock %}

{% block content %}
<div class="container page-header">
    <h1>Thank You!</h1>
    <p>Your order has been placed successfully.</p>
</div>
<div class="container">
    <div class="order-confirmation-box">
        <p><strong>Order #{{ order.id }}</strong></p>
        <p>Total: ${{ order.total }}</p>
        <p>Date: {{ order.created_at|date:"F j, Y" }}</p>
        <a href="{% url 'store:order_history' %}" class="btn btn-primary">View Order History</a>
        <a href="{% url 'store:product_list' %}" class="btn btn-secondary">Continue Shopping</a>
    </div>
</div>
{% endblock %}
